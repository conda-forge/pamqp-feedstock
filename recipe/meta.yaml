{% set name = "pamqp" %}
{% set version = "4.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9dd13b828e346622793981f14a5df817fce5de998c746209d6c0154eb8403970

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - pamqp
    - pamqp.frame
    - pamqp.body
    - pamqp.frame
    - pamqp.decode
    - pamqp.encode
    - pamqp.exceptions
    - pamqp.heartbeat

about:
  home: https://github.com/gmr/pamqp
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: pamqp is a pure-python AMQP 0-9-1 frame encoder and decoder
  description: |
    pamqp is a pure-python AMQP 0-9-1 frame encoder and decoder. The aim is to create a client agnostic python encoder and decoder for general purpose use.
  doc_url: https://pamqp.readthedocs.io/
  dev_url: https://github.com/gmr/pamqp

extra:
  recipe-maintainers:
    - akrherz
    - gregfreeman
